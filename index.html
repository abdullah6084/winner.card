<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#061f4b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Winner Card">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Winner Card</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="phone-shell">
    <section id="mainMenu" class="screen screen-menu is-active">
      <button class="icon-button top-right" id="quickSettingsButton" aria-label="Открыть настройки">⚙</button>
      <div class="brand">
        <p class="brand-kicker">Winner Card</p>
        <h1>Memory</h1>
        <span>найди пары</span>
      </div>
      <div class="menu-actions">
        <button class="primary-button orange" id="startButton"><span>▶</span> Старт</button>
        <button class="primary-button blue" id="continueButton" hidden><span>↻</span> Продолжить</button>
        <button class="primary-button violet" id="settingsButton"><span>⚙</span> Настройки</button>
      </div>
    </section>

    <section id="settingsScreen" class="screen">
      <header class="screen-header">
        <button class="icon-button" data-go="mainMenu" aria-label="Назад">←</button>
        <h2>Настройки</h2>
      </header>

      <div class="panel">
        <h3>Размер поля</h3>
        <div class="choice-grid" id="sizeChoices"></div>
      </div>

      <div class="panel">
        <h3>Тип карточек</h3>
        <div class="card-type-grid" id="typeChoices"></div>
      </div>

      <div class="panel">
        <h3>Время игры</h3>
        <label class="switch-row">
          <span>Таймер</span>
          <input type="checkbox" id="timerEnabled">
        </label>
        <label class="select-row">
          <span>Длительность</span>
          <select id="timeLimit"></select>
        </label>
      </div>

      <button class="primary-button green full" id="openPlayersButton">Игроки</button>
    </section>

    <section id="playersScreen" class="screen">
      <header class="screen-header">
        <button class="icon-button" data-go="settingsScreen" aria-label="Назад">←</button>
        <h2>Игроки</h2>
      </header>

      <div class="panel player-count-panel">
        <h3>Количество игроков</h3>
        <div class="counter">
          <button class="icon-button" id="removePlayerButton" aria-label="Убрать игрока">−</button>
          <strong id="playerCount">1</strong>
          <button class="icon-button" id="addPlayerButton" aria-label="Добавить игрока">+</button>
        </div>
      </div>

      <div class="players-list" id="playersList"></div>
      <button class="primary-button green full bottom-action" id="savePlayersButton">Готово</button>
    </section>

    <section id="gameScreen" class="screen screen-game">
      <header class="game-topbar">
        <button class="icon-button" id="backToMenuButton" aria-label="В главное меню">←</button>
        <div class="timer-pill" id="timerPill">∞</div>
        <button class="icon-button" id="pauseButton" aria-label="Меню игры">☰</button>
      </header>

      <section class="score-panel">
        <div>
          <span>Ход игрока</span>
          <strong id="currentPlayerLabel"></strong>
        </div>
        <div>
          <span>Счет</span>
          <strong id="currentScoreLabel">0</strong>
        </div>
      </section>

      <section class="all-scores" id="scoresBoard"></section>
      <section class="board" id="board" aria-label="Игровое поле"></section>
    </section>

    <div class="overlay" id="pauseOverlay" hidden>
      <div class="modal">
        <button class="modal-close" id="closePauseButton" aria-label="Закрыть">×</button>
        <h2>Меню</h2>
        <button class="primary-button orange" id="resumeButton">Продолжить</button>
        <button class="primary-button blue" id="restartButton">Начать заново</button>
        <button class="primary-button red" id="exitButton">Выйти в меню</button>
      </div>
    </div>

    <div class="overlay" id="resultOverlay" hidden>
      <div class="modal">
        <h2 id="resultTitle">Победа!</h2>
        <div id="resultScores" class="result-scores"></div>
        <button class="primary-button blue" id="playAgainButton">Начать заново</button>
        <button class="primary-button red" id="resultExitButton">В меню</button>
      </div>
    </div>
  </main>

  <script src="cards.js"></script>
  <script src="db.js"></script>
  <script src="settings.js"></script>
  <script src="game.js"></script>
  <script src="main.js"></script>
</body>
</html>
